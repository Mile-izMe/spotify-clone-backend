version: "3.8"

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio-spotify
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=spotify
      - MINIO_ROOT_PASSWORD=spotify123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    restart: unless-stopped

volumes:
  minio_data:
    driver: local