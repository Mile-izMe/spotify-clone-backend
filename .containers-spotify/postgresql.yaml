services:
  postgresql:
    image: docker.io/bitnamilegacy/postgresql:latest
    ports:
      - '5432:5432'
    volumes:
      - 'postgresql_data:/bitnami/postgresql'
    environment:
      - 'ALLOW_EMPTY_PASSWORD=false'
      - 'POSTGRESQL_USERNAME=postgres'
      - 'POSTGRESQL_DATABASE=postgres'
      - 'POSTGRESQL_PASSWORD=Minh123_A'

volumes:
  postgresql_data:
    driver: local
